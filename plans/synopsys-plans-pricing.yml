      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://polaris.synopsys.com/api
          - https://coverity.synopsys.com/api
          - https://api.synopsys.com/openlink
          - https://seeker.synopsys.com/api
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://polaris.synopsys.com/api
          - https://coverity.synopsys.com/api
          - https://api.synopsys.com/openlink
          - https://seeker.synopsys.com/api
