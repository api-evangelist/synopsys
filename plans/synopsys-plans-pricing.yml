specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Synopsys
providerId: synopsys
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Software Security
  - Application Security Testing
  - EDA Tools
  - Semiconductor Design
description: Synopsys's APIs (Polaris, Coverity, Seeker, Cloud OpenLink) are bundled with paid product licenses in the Software Integrity Group (now operating as Black Duck) portfolio and the Synopsys Cloud EDA platform. There is no published per-API price; license terms (per-developer, per-LOC, per-application, EDA license-month) are negotiated through Synopsys / Black Duck sales and channel partners.
sources:
  - https://www.synopsys.com
  - https://polaris.synopsys.com/developer/default/documentation
  - https://www.synopsys.com/cloud/openlink/api.html
notes: Pricing is contact-sales / channel-quoted. APIs are included with the underlying product license (Polaris, Coverity, Seeker, Synopsys Cloud); there is no usage-metered API price. The Software Integrity Group has been spun out as Black Duck and is invoiced under Black Duck contracts.
plans:
  - id: synopsys-contact-sales
    name: Contact Sales
    type: enterprise
    description: API access is bundled with the underlying Synopsys / Black Duck product license. License pricing is set by sales and channel partners and is not published.
    entries:
      - label: License-Bundled API Access
        name: license_bundled_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Synopsys Polaris API
      - name: Synopsys Coverity REST API
      - name: Synopsys Seeker REST API
      - name: Synopsys Cloud OpenLink API
      - name: Bundled with Product License
