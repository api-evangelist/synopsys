specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Synopsys
providerId: synopsys
publisherName: Synopsys, Inc. (Software Integrity products billed via Black Duck Software, Inc.)
serviceCategory: Application Security / EDA
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Application Security
  - EDA
  - Semiconductor
  - FinOps
  - FOCUS
description: Synopsys's APIs are bundled with paid product licenses (Polaris, Coverity, Seeker for AppSec; Synopsys Cloud / OpenLink for EDA). There is no usage-metered API billing surface; FinOps shape is approximated against the underlying license invoice.
sources:
  - https://www.synopsys.com
  - https://polaris.synopsys.com/developer/default/documentation
  - https://www.synopsys.com/cloud/openlink/api.html
notes: No FOCUS-aligned per-call billing surface. Cost data is reconciled from license invoices issued by Synopsys, Inc. (EDA / Synopsys Cloud) and Black Duck Software, Inc. (former Synopsys Software Integrity Group products).
billingModel:
  pricingCategory: Enterprise License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Synopsys APIs (Polaris, Coverity, Seeker, Cloud OpenLink)
  ServiceCategory: Application Security / EDA
  ProviderName: Synopsys
  PublisherName: Synopsys, Inc.
  InvoiceIssuerName: Synopsys, Inc. / Black Duck Software, Inc.
  BillingCurrency: USD
meters:
  - name: appsec_developer_licenses
    description: Developer / contributor licenses on Polaris, Coverity, and Seeker (the typical commercial unit for AppSec).
    unit: developer
    aggregation: max
  - name: scanned_applications
    description: Applications under scan / SCA - alternate commercial unit on some Polaris and Black Duck SKUs.
    unit: application
    aggregation: max
  - name: eda_license_months
    description: Synopsys Cloud / EDA tool license-months; the dominant commercial unit on the EDA side.
    unit: license-month
    aggregation: sum
  - name: openlink_entitlements
    description: License entitlements distributed through the Cloud OpenLink API.
    unit: entitlement
    aggregation: count
principles:
  - name: Visibility
    description: Visibility is on a per-license basis from Synopsys / Black Duck commercial portals; the API surface itself is not separately metered or invoiced.
  - name: Allocation
    description: Allocate by product (Polaris/Coverity/Seeker/Cloud) and by developer or application count - the same units Synopsys and Black Duck use on their invoices.
  - name: Optimization
    description: Optimization is commercial - right-size developer counts, consolidate AppSec tools onto a single platform, schedule EDA jobs to reduce concurrent license-month consumption, and renegotiate at term boundaries.
  - name: Accountability
    description: AppSec / DevSecOps team owns developer counts and scan policies; semiconductor design team owns EDA license consumption; procurement owns the Synopsys/Black Duck contracts.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
