naftiko: 1.0.0-alpha2
info:
  label: Synopsys Polaris API — Issues
  description: 'Synopsys Polaris API — Issues. 2 operations. Lead operation: List Issues. Self-contained Naftiko capability
    covering one Synopsys business surface.'
  tags:
  - Synopsys
  - Issues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYNOPSYS_API_KEY: SYNOPSYS_API_KEY
capability:
  consumes:
  - type: http
    namespace: polaris-issues
    baseUri: https://polaris.synopsys.com/api/v1
    description: Synopsys Polaris API — Issues business capability. Self-contained, no shared references.
    resources:
    - name: issues
      path: /issues
      operations:
      - name: listissues
        method: GET
        description: List Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: query
          type: string
        - name: branchId
          in: query
          type: string
        - name: severity
          in: query
          type: string
        - name: type
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
    - name: issues-issueId
      path: /issues/{issueId}
      operations:
      - name: getissue
        method: GET
        description: Get Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SYNOPSYS_API_KEY}}'
  exposes:
  - type: rest
    namespace: polaris-issues-rest
    port: 8080
    description: REST adapter for Synopsys Polaris API — Issues. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/issues
      name: issues
      description: REST surface for issues.
      operations:
      - method: GET
        name: listissues
        description: List Issues
        call: polaris-issues.listissues
        with:
          projectId: rest.projectId
          branchId: rest.branchId
          severity: rest.severity
          type: rest.type
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issues/{issueid}
      name: issues-issueid
      description: REST surface for issues-issueId.
      operations:
      - method: GET
        name: getissue
        description: Get Issue
        call: polaris-issues.getissue
        with:
          issueId: rest.issueId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: polaris-issues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Synopsys Polaris API — Issues. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-issues
      description: List Issues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: polaris-issues.listissues
      with:
        projectId: tools.projectId
        branchId: tools.branchId
        severity: tools.severity
        type: tools.type
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-issue
      description: Get Issue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: polaris-issues.getissue
      with:
        issueId: tools.issueId
      outputParameters:
      - type: object
        mapping: $.
