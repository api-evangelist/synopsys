naftiko: 1.0.0-alpha2
info:
  label: Synopsys Polaris API — Scans
  description: 'Synopsys Polaris API — Scans. 2 operations. Lead operation: List Scans. Self-contained Naftiko capability
    covering one Synopsys business surface.'
  tags:
  - Synopsys
  - Scans
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYNOPSYS_API_KEY: SYNOPSYS_API_KEY
capability:
  consumes:
  - type: http
    namespace: polaris-scans
    baseUri: https://polaris.synopsys.com/api/v1
    description: Synopsys Polaris API — Scans business capability. Self-contained, no shared references.
    resources:
    - name: jobs-runs
      path: /jobs/runs
      operations:
      - name: listscans
        method: GET
        description: List Scans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: query
          type: string
        - name: branchId
          in: query
          type: string
        - name: status
          in: query
          type: string
    - name: jobs-runs-runId
      path: /jobs/runs/{runId}
      operations:
      - name: getscan
        method: GET
        description: Get Scan Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: runId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SYNOPSYS_API_KEY}}'
  exposes:
  - type: rest
    namespace: polaris-scans-rest
    port: 8080
    description: REST adapter for Synopsys Polaris API — Scans. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs/runs
      name: jobs-runs
      description: REST surface for jobs-runs.
      operations:
      - method: GET
        name: listscans
        description: List Scans
        call: polaris-scans.listscans
        with:
          projectId: rest.projectId
          branchId: rest.branchId
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/runs/{runid}
      name: jobs-runs-runid
      description: REST surface for jobs-runs-runId.
      operations:
      - method: GET
        name: getscan
        description: Get Scan Run
        call: polaris-scans.getscan
        with:
          runId: rest.runId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: polaris-scans-mcp
    port: 9090
    transport: http
    description: MCP adapter for Synopsys Polaris API — Scans. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-scans
      description: List Scans
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: polaris-scans.listscans
      with:
        projectId: tools.projectId
        branchId: tools.branchId
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-scan-run
      description: Get Scan Run
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: polaris-scans.getscan
      with:
        runId: tools.runId
      outputParameters:
      - type: object
        mapping: $.
