naftiko: "1.0.0-alpha1"

info:
  label: "Synopsys Cloud OpenLink API"
  description: "Vendor entitlement and license distribution API for Synopsys Cloud semiconductor EDA tool licensing."
  tags:
    - Synopsys
    - EDA Tools
    - License Management
    - Semiconductor Design
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYNOPSYS_OPENLINK_API_KEY: SYNOPSYS_OPENLINK_API_KEY

capability:
  consumes:
    - type: http
      namespace: synopsys-openlink
      baseUri: https://api.synopsys.com/openlink/v1
      description: "Synopsys Cloud OpenLink vendor entitlement and license API."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{SYNOPSYS_OPENLINK_API_KEY}}"
        placement: header
      resources:
        - name: entitlements
          path: /entitlements
          description: "Vendor entitlement queries."
          operations:
            - name: get-entitlements
              method: POST
              description: "Retrieves available licenses for a specific customer."
              inputParameters:
                - name: customerId
                  in: body
                  type: string
                  required: true
                - name: productId
                  in: body
                  type: string
                  required: true
                - name: requestId
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  customerId: "{{tools.customerId}}"
                  productId: "{{tools.productId}}"
                  requestId: "{{tools.requestId}}"

        - name: licenses
          path: /licenses
          description: "License file generation."
          operations:
            - name: generate-license
              method: POST
              description: "Generates a license file for a customer entitlement."
              inputParameters:
                - name: entitlementId
                  in: body
                  type: string
                  required: true
                - name: customerId
                  in: body
                  type: string
                  required: true
                - name: hostId
                  in: body
                  type: string
                  required: false
                - name: quantity
                  in: body
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  entitlementId: "{{tools.entitlementId}}"
                  customerId: "{{tools.customerId}}"
                  hostId: "{{tools.hostId}}"
                  quantity: "{{tools.quantity}}"
            - name: download-license
              method: GET
              description: "Downloads a previously generated license file."
              inputParameters:
                - name: licenseId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: synopsys-openlink-api
      resources:
        - path: /v1/entitlements
          name: entitlements
          operations:
            - method: POST
              name: get-entitlements
              call: "synopsys-openlink.get-entitlements"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: synopsys-openlink-mcp
      transport: http
      tools:
        - name: get-entitlements
          description: "Retrieve available EDA tool license entitlements for a customer."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "synopsys-openlink.get-entitlements"
          outputParameters:
            - type: object
              mapping: "$."
